<div class="container-bnb section-sm page-shell">
  <app-breadcrumb [items]="crumbs" />
  <h1 class="section-title mt-3">{{ 'rooms.listTitle' | translate }}</h1>
  <span class="accent-line" aria-hidden="true"></span>
  <div class="row g-4 mt-2">
    @for (room of rooms; track room.id) {
      <div class="col-md-6 col-xl-4">
        <article class="card h-100 border-0 shadow-sm room-card">
          <img
            [src]="room.thumbnail"
            class="card-img-top"
            [attr.alt]="room.name | translate"
            appLazyImage
          />
          <div class="card-body d-flex flex-column">
            <h2 class="h5">{{ room.name | translate }}</h2>
            <p class="small text-muted flex-grow-1">{{ room.shortDescription | translate }}</p>
            <p class="fw-semibold">
              {{ room.pricePerNight | currencyEur }} {{ 'common.perNight' | translate }}
            </p>
            <a [routerLink]="['/camere', room.slug]" class="btn-primary-bnb align-self-start">{{
              'rooms.details' | translate
            }}</a>
          </div>
        </article>
      </div>
    }
  </div>
</div>
