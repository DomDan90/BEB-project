<section class="gallery-section section-sm" aria-labelledby="gallery-section-heading">
  <div class="container-bnb">
    <header class="gallery-section__header text-center">
      <h2 id="gallery-section-heading" class="section-title">Galleria</h2>
      <span class="accent-line gallery-section__accent" aria-hidden="true"></span>
      <p class="gallery-section__intro text-body-secondary">
        Un assaggio degli spazi del B&amp;B: clicca sulle foto per ingrandirle e sfogliare la raccolta.
      </p>
    </header>

    <div class="gallery-section__masonry" role="list">
      @for (item of items; track item.seed; let i = $index) {
        <div
          class="gallery-section__item"
          role="listitem"
          data-aos="fade-up"
          [attr.data-aos-delay]="i * 100"
          data-aos-duration="700"
        >
          <button
            type="button"
            class="gallery-section__trigger"
            (click)="openAlbum(i)"
            [attr.aria-label]="'Apri in lightbox: ' + item.alt"
          >
            <img
              class="gallery-section__img"
              [src]="gridSrc(item)"
              [alt]="item.alt"
              [width]="item.width"
              [height]="item.height"
              loading="lazy"
              decoding="async"
            />
            <span class="gallery-section__hover" aria-hidden="true">
              <i class="bi bi-zoom-in gallery-section__zoom-icon"></i>
            </span>
          </button>
        </div>
      }
    </div>
  </div>
</section>
