<section id="home-galleria" class="gallery-section section-sm" aria-labelledby="gallery-section-heading">
  <div class="container-bnb">
    <header class="gallery-section__header text-center">
      <h2 id="gallery-section-heading" class="section-title">{{ 'home.gallery.title' | translate }}</h2>
      <span class="accent-line gallery-section__accent" aria-hidden="true"></span>
      <p class="gallery-section__intro text-body-secondary">
        {{ 'home.gallery.intro' | translate }}
      </p>
    </header>

    <div class="gallery-section__masonry" role="list">
      @for (item of items; track item.thumbSrc; let i = $index) {
        <div
          class="gallery-section__item"
          role="listitem"
          data-aos="fade-up"
          [attr.data-aos-delay]="i * 100"
          data-aos-duration="700"
        >
          <button
            type="button"
            class="gallery-section__trigger"
            (click)="openAlbum(i)"
            [attr.aria-label]="
              ('home.gallery.openLightbox' | translate) + ': ' + (item.altKey | translate)
            "
          >
            <img
              class="gallery-section__img"
              [src]="gridSrc(item)"
              [attr.alt]="item.altKey | translate"
              [width]="item.thumbW"
              [height]="item.thumbH"
              loading="lazy"
              decoding="async"
            />
            <span class="gallery-section__hover" aria-hidden="true">
              <i class="bi bi-zoom-in gallery-section__zoom-icon"></i>
            </span>
          </button>
        </div>
      }
    </div>
  </div>
</section>
