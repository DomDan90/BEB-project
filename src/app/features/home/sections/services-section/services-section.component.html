<section id="home-servizi" class="services-section" aria-labelledby="services-section-heading">
  <div
    class="services-section__bg"
    [class.services-section__bg--parallax]="parallaxEnabled()"
  >
    <div class="services-section__overlay" aria-hidden="true"></div>
    <div class="container-bnb services-section__inner">
      <header class="services-section__header text-center">
        <h2 id="services-section-heading" class="services-section__title">
          {{ 'home.services.title' | translate }}
        </h2>
        <span class="services-section__accent" aria-hidden="true"></span>
        <p class="services-section__intro">
          {{ 'home.services.intro' | translate }}
        </p>
      </header>

      <div class="services-section__grid" role="list">
        @for (item of services; track item.titleKey; let i = $index) {
          <article
            class="services-section__card"
            role="listitem"
            data-aos="fade-up"
            [attr.data-aos-delay]="i * 100"
            data-aos-duration="700"
          >
            <div class="services-section__icon-wrap" aria-hidden="true">
              <i class="bi {{ item.icon }} services-section__icon"></i>
            </div>
            <h3 class="services-section__card-title">{{ item.titleKey | translate }}</h3>
            <p class="services-section__card-text">{{ item.descriptionKey | translate }}</p>
          </article>
        }
      </div>
    </div>
  </div>
</section>
