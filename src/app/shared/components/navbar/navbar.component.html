<header class="header-bnb">
  <nav class="navbar navbar-expand-lg navbar-bnb" aria-label="Navigazione principale">
    <div class="container-fluid container-bnb">
      <a class="navbar-brand logo-bnb d-flex align-items-center gap-2" routerLink="/">
        <img
          [src]="brandLogoSrc"
          [alt]="brandLogoAlt"
          width="200"
          height="56"
          class="logo-img"
          loading="eager"
          decoding="async"
        />
        <span class="brand-text d-none d-sm-inline">B&amp;B</span>
      </a>

      <button
        class="navbar-toggler navbar-toggler-bnb"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNav"
        aria-controls="mainNav"
        aria-expanded="false"
        aria-label="Apri o chiudi menu di navigazione"
      >
        <i class="bi bi-list" aria-hidden="true"></i>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              >Home</a
            >
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/chi-siamo" routerLinkActive="active">Chi siamo</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/camere" routerLinkActive="active">Camere</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/galleria" routerLinkActive="active">Galleria</a>
          </li>

          <li class="nav-item dropdown">
            <button
              type="button"
              class="nav-link dropdown-toggle dropdown-toggle-bnb"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              aria-haspopup="true"
              id="navBlogDropdown"
            >
              Blog
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-sm" aria-labelledby="navBlogDropdown">
              <li>
                <a class="dropdown-item" routerLink="/blog">Tutti gli articoli</a>
              </li>
              <li>
                <a class="dropdown-item" routerLink="/blog">Approfondimenti</a>
              </li>
            </ul>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/contatti" routerLinkActive="active">Contatti</a>
          </li>
          <li class="nav-item ms-lg-2">
            <a class="btn btn-prenota" routerLink="/prenota" routerLinkActive="active">Prenota</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
