<header class="header-bnb" [class.is-home-top]="isHomeTop">
  <nav class="navbar navbar-expand-lg navbar-bnb" aria-label="Navigazione principale">
    <div class="container-fluid container-bnb">
      <a class="navbar-brand logo-bnb d-flex align-items-center gap-2" routerLink="/">
        <app-brand-logo class="logo-img" [ariaLabel]="brandLogoAlt" />
      </a>

      <button
        class="navbar-toggler navbar-toggler-bnb"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNav"
        aria-controls="mainNav"
        aria-expanded="false"
        aria-label="Apri o chiudi menu di navigazione"
      >
        <i class="bi bi-list" aria-hidden="true"></i>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <!-- Ordine come le sezioni della home (scroll); poi Blog e Prenota. -->
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/"
              (click)="onNavLinkClick($event, 'home-hero', 'home')"
              [class.active]="isNavActive('home')"
              [attr.aria-current]="isNavActive('home') ? 'page' : null"
              >Home</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/camere"
              (click)="onNavLinkClick($event, 'home-camere', 'camere')"
              [class.active]="isNavActive('camere')"
              [attr.aria-current]="isNavActive('camere') ? 'page' : null"
              >Camere</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/chi-siamo"
              (click)="onNavLinkClick($event, 'home-chi-siamo', 'chi-siamo')"
              [class.active]="isNavActive('chi-siamo')"
              [attr.aria-current]="isNavActive('chi-siamo') ? 'page' : null"
              >Chi siamo</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/galleria"
              (click)="onNavLinkClick($event, 'home-galleria', 'galleria')"
              [class.active]="isNavActive('galleria')"
              [attr.aria-current]="isNavActive('galleria') ? 'page' : null"
              >Galleria</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/contatti"
              (click)="onNavLinkClick($event, 'home-dove-siamo', 'contatti')"
              [class.active]="isNavActive('contatti')"
              [attr.aria-current]="isNavActive('contatti') ? 'page' : null"
              >Contatti</a
            >
          </li>

          <li class="nav-item dropdown">
            <button
              type="button"
              class="nav-link dropdown-toggle dropdown-toggle-bnb"
              [class.active]="isNavActive('blog')"
              data-bs-toggle="dropdown"
              aria-expanded="false"
              aria-haspopup="true"
              id="navBlogDropdown"
            >
              Blog
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-sm" aria-labelledby="navBlogDropdown">
              <li>
                <a
                  class="dropdown-item"
                  routerLink="/blog"
                  (click)="onNavLinkClick($event, null, 'blog')"
                  [class.active]="isNavActive('blog')"
                  [attr.aria-current]="isNavActive('blog') ? 'page' : null"
                  >Tutti gli articoli</a
                >
              </li>
              <li>
                <a
                  class="dropdown-item"
                  routerLink="/blog"
                  (click)="onNavLinkClick($event, null, 'blog')"
                  [class.active]="isNavActive('blog')"
                  >Approfondimenti</a
                >
              </li>
            </ul>
          </li>
          <li class="nav-item ms-lg-2">
            <a
              class="btn btn-prenota"
              routerLink="/prenota"
              (click)="onNavLinkClick($event, null, 'prenota')"
              [class.active]="isNavActive('prenota')"
              [attr.aria-current]="isNavActive('prenota') ? 'page' : null"
              >Prenota</a
            >
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
